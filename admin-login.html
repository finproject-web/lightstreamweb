<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LightStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #333333 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-cool {
            color: #ffa500;
        }
        .cool-button {
            background: linear-gradient(45deg, #000000, #333333);
            transition: all 0.3s ease;
        }
        .cool-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body class="bg-black">
    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <img src="images/newlogo.png" alt="LightStream Logo" class="h-8 w-auto">
                    <span class="text-xl font-bold text-white">LightStream <span class="text-cool">Admin</span></span>
                </div>
                <a href="index.html" class="text-gray-300 hover:text-cool transition">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Site
                </a>
            </div>
        </nav>
    </header>

    <!-- Login Content -->
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto">
            <div class="glass-effect rounded-lg p-8 border border-cool">
                <div class="text-center mb-8">
                    <div class="flex justify-center mb-6">
                        <i class="fas fa-user-shield text-6xl text-cool"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-white mb-2">Admin Login</h1>
                    <p class="text-gray-300">Access the admin dashboard</p>
                </div>

                <form id="adminLoginForm" class="space-y-6">
                    <div>
                        <label class="block text-gray-300 text-sm font-medium mb-2">Admin Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="adminUsername" required class="w-full pl-10 pr-4 py-3 bg-black/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-cool focus:ring-2 focus:ring-cool/20" placeholder="Enter admin username">
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-300 text-sm font-medium mb-2">Admin Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="adminPassword" required class="w-full pl-10 pr-12 py-3 bg-black/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-cool focus:ring-2 focus:ring-cool/20" placeholder="Enter admin password">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <button type="button" id="togglePassword" class="text-gray-400 hover:text-white">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-cool text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition duration-200">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login to Admin Panel
                    </button>
                </form>

                <div class="mt-6 bg-red-500/10 border border-red-500 rounded-lg p-4">
                    <div class="flex items-start">
                        <i class="fas fa-exclamation-triangle text-red-500 mr-3 mt-1"></i>
                        <div>
                            <h4 class="text-red-500 font-semibold mb-1">Security Notice</h4>
                            <p class="text-gray-400 text-sm">This is a restricted area. Unauthorized access is prohibited and will be logged.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default admin credentials (in production, this should be server-side)
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'LightStream@2024'
        };

        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                window.location.href = 'admin-dashboard.html';
            }

            // Password visibility toggle
            const passwordInput = document.getElementById('adminPassword');
            const toggleButton = document.getElementById('togglePassword');

            toggleButton.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const icon = toggleButton.querySelector('i');
                if (type === 'text') {
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });

            // Admin login form
            document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('adminUsername').value;
                const password = document.getElementById('adminPassword').value;
                
                if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                    // Successful login
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('adminLoginTime', new Date().toISOString());
                    alert('✅ Admin login successful!');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert('❌ Invalid admin credentials. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
