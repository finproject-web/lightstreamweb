<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LightStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="supabase-client.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #333333 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-cool {
            color: #ffa500;
        }
        .status-approved {
            background: linear-gradient(45deg, #10b981, #059669);
        }
        .status-pending {
            background: linear-gradient(45deg, #f59e0b, #d97706);
        }
        .status-processing {
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
        }
    </style>
</head>
<body class="bg-black">
    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <img src="images/newlogo.png" alt="LightStream Logo" class="h-8 w-auto">
                    <span class="text-xl font-bold text-white">LightStream <span class="text-cool">Admin</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-300 text-sm">
                        <i class="fas fa-user-shield mr-2"></i>Admin
                    </span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Stats Overview -->
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="glass-effect rounded-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Total Applications</p>
                        <p class="text-3xl font-bold text-white" id="totalApplications">0</p>
                    </div>
                    <i class="fas fa-file-alt text-3xl text-cool"></i>
                </div>
            </div>
            <div class="glass-effect rounded-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Approved</p>
                        <p class="text-3xl font-bold text-green-500" id="approvedCount">0</p>
                    </div>
                    <i class="fas fa-check-circle text-3xl text-green-500"></i>
                </div>
            </div>
            <div class="glass-effect rounded-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Pending</p>
                        <p class="text-3xl font-bold text-yellow-500" id="pendingCount">0</p>
                    </div>
                    <i class="fas fa-clock text-3xl text-yellow-500"></i>
                </div>
            </div>
            <div class="glass-effect rounded-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm">Processing</p>
                        <p class="text-3xl font-bold text-blue-500" id="processingCount">0</p>
                    </div>
                    <i class="fas fa-spinner text-3xl text-blue-500"></i>
                </div>
            </div>
        </div>

        <!-- Applications Table -->
        <div class="glass-effect rounded-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white">Loan Applications</h2>
                <button onclick="refreshData()" class="bg-cool text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition">
                    <i class="fas fa-sync-alt mr-2"></i>Refresh
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="text-left text-gray-400 py-3 px-4">Application ID</th>
                            <th class="text-left text-gray-400 py-3 px-4">Customer Name</th>
                            <th class="text-left text-gray-400 py-3 px-4">Email</th>
                            <th class="text-left text-gray-400 py-3 px-4">Loan Amount</th>
                            <th class="text-left text-gray-400 py-3 px-4">Status</th>
                            <th class="text-left text-gray-400 py-3 px-4">Insurance Review</th>
                            <th class="text-left text-gray-400 py-3 px-4">Date</th>
                            <th class="text-left text-gray-400 py-3 px-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTable">
                        <!-- Applications will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Application Detail Modal -->
    <div id="applicationModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden">
        <div class="container mx-auto px-4 py-8 h-full overflow-y-auto">
            <div class="glass-effect rounded-lg p-8 max-w-4xl mx-auto my-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white">Application Details</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>

                <div id="applicationDetails">
                    <!-- Application details will be loaded here -->
                </div>

                <!-- Admin Notes Section -->
                <div class="mt-8 border-t border-gray-700 pt-6">
                    <h3 class="text-xl font-bold text-white mb-4">
                        <i class="fas fa-sticky-note mr-2 text-cool"></i>Admin Notes
                    </h3>
                    
                    <div id="existingNotes" class="space-y-3 mb-4">
                        <!-- Existing notes will be loaded here -->
                    </div>

                    <div class="bg-black/50 rounded-lg p-4">
                        <textarea id="newNote" class="w-full bg-transparent border border-gray-600 rounded-lg p-3 text-white placeholder-gray-400 focus:outline-none focus:border-cool" rows="3" placeholder="Add a note for this application..."></textarea>
                        <div class="flex justify-end mt-3">
                            <button onclick="addNote()" class="bg-cool text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition">
                                <i class="fas fa-plus mr-2"></i>Add Note
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentApplicationId = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Check if admin is logged in
            if (localStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = 'admin-login.html';
                return;
            }

            // Clean up applications older than 7 days
            cleanupOldApplications();

            loadApplications();
        });

        function cleanupOldApplications() {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            // Check and clean loanApplicationData
            const loanData = localStorage.getItem('loanApplicationData');
            if (loanData) {
                const data = JSON.parse(loanData);
                const appDate = new Date(data.createdAt || data.timestamp);
                if (appDate < sevenDaysAgo) {
                    console.log('Deleting old application:', data.email);
                    localStorage.removeItem('loanApplicationData');
                    localStorage.removeItem('loanAgreementData');
                    localStorage.removeItem('userCredentials');
                    // Also remove admin notes
                    localStorage.removeItem(`adminNotes_${data.email}`);
                }
            }

            // Check other application entries
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('loanApplication_')) {
                    const app = JSON.parse(localStorage.getItem(key));
                    const appDate = new Date(app.createdAt || app.timestamp);
                    if (appDate < sevenDaysAgo) {
                        console.log('Deleting old application:', key);
                        localStorage.removeItem(key);
                        localStorage.removeItem(`adminNotes_${app.email}`);
                    }
                }
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('adminLoggedIn');
                localStorage.removeItem('adminLoginTime');
                window.location.href = 'admin-login.html';
            }
        }

        async function loadApplications() {
            // Wait for supabase to be available
            if (typeof window.supabase === 'undefined') {
                console.log('Waiting for Supabase client to initialize...');
                await new Promise(resolve => {
                    const checkInterval = setInterval(() => {
                        if (typeof window.supabase !== 'undefined') {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                });
            }

            try {
                // Get all applications from Supabase (no 7-day filter)
                const { data: applications, error } = await window.supabase
                    .from('loan_applications')
                    .select('*')
                    .order('created_at', { ascending: false });

                console.log('Applications loaded:', { applications, error });

                if (error) {
                    console.error('Error loading applications from Supabase:', error);
                    // Fallback to localStorage if Supabase fails
                    loadFromLocalStorage();
                    return;
                }

                // Update stats
                document.getElementById('totalApplications').textContent = applications.length;
                document.getElementById('approvedCount').textContent = applications.filter(a => a.status === 'Approved').length;
                document.getElementById('pendingCount').textContent = applications.filter(a => a.status === 'Pending').length;
                document.getElementById('processingCount').textContent = applications.filter(a => a.status === 'Processing').length;

                // Get insurance review status for all applications
                const emails = applications.map(app => app.email);
                const { data: insuranceReviews, error: reviewError } = await window.supabase
                    .from('insurance_policy_reviews')
                    .select('email, review_completed, completed_at')
                    .in('email', emails);

                const reviewMap = {};
                if (insuranceReviews) {
                    insuranceReviews.forEach(review => {
                        reviewMap[review.email] = review;
                    });
                }

                // Populate table
                const tableBody = document.getElementById('applicationsTable');
                tableBody.innerHTML = '';

                if (applications.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-400 py-8">No applications found (applications are deleted after 7 days)</td></tr>';
                    return;
                }

                applications.forEach(app => {
                    const fullName = app.full_name || `${app.first_name || ''} ${app.last_name || ''}`.trim();
                    const statusClass = app.status === 'Approved' ? 'status-approved' : 
                                       app.status === 'Pending' ? 'status-pending' : 'status-processing';
                    
                    // Check insurance review status
                    const review = reviewMap[app.email];
                    let reviewStatus = '<span class="text-yellow-500"><i class="fas fa-clock mr-1"></i>Pending</span>';
                    if (review && review.review_completed) {
                        reviewStatus = '<span class="text-green-500"><i class="fas fa-check-circle mr-1"></i>Completed</span>';
                    }
                    
                    const row = document.createElement('tr');
                    row.className = 'border-b border-gray-700 hover:bg-white/5';
                    row.innerHTML = `
                        <td class="py-3 px-4 text-white">${app.id || 'N/A'}</td>
                        <td class="py-3 px-4 text-white">${fullName}</td>
                        <td class="py-3 px-4 text-white">${app.email}</td>
                        <td class="py-3 px-4 text-white">$${parseFloat(app.loan_amount || 0).toLocaleString()}</td>
                        <td class="py-3 px-4">
                            <span class="px-3 py-1 rounded-full text-sm font-semibold text-white ${statusClass}">${app.status || 'Processing'}</span>
                        </td>
                        <td class="py-3 px-4">${reviewStatus}</td>
                        <td class="py-3 px-4 text-white">${app.created_at ? new Date(app.created_at).toLocaleDateString() : 'N/A'}</td>
                        <td class="py-3 px-4">
                            <button onclick="viewApplication('${app.email}')" class="text-cool hover:text-orange-600 mr-3">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button onclick="triggerInsuranceReview('${app.email}')" class="text-blue-500 hover:text-blue-400 mr-3" title="Trigger Insurance Policy Review">
                                <i class="fas fa-shield-alt"></i>
                            </button>
                            ${review && review.review_completed ? `<button onclick="viewInsuranceReview('${app.email}')" class="text-purple-500 hover:text-purple-400 mr-3" title="View Insurance Review">
                                <i class="fas fa-file-contract"></i>
                            </button>` : `<button onclick="deleteCustomer('${app.email}')" class="text-red-500 hover:text-red-400 mr-3" title="Delete Customer (Not Agreed)">
                                <i class="fas fa-trash"></i>
                            </button>`}
                            <button onclick="updateStatus('${app.email}')" class="text-green-500 hover:text-green-400">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error('Supabase load error:', error);
                loadFromLocalStorage();
            }
        }

        function loadFromLocalStorage() {
            // Fallback to localStorage if Supabase fails
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            const applications = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('loanApplication_')) {
                    const app = JSON.parse(localStorage.getItem(key));
                    const appDate = new Date(app.createdAt || app.timestamp);
                    if (appDate >= sevenDaysAgo) {
                        applications.push(app);
                    }
                }
            }

            const currentLoanData = localStorage.getItem('loanApplicationData');
            if (currentLoanData) {
                const data = JSON.parse(currentLoanData);
                const appDate = new Date(data.createdAt || data.timestamp || new Date());
                if (appDate >= sevenDaysAgo) {
                    const existingApp = applications.find(app => app.email === data.email);
                    if (!existingApp) {
                        applications.push({
                            ...data,
                            applicationId: `LS-${Date.now()}`,
                            status: 'Processing',
                            createdAt: data.createdAt || new Date().toISOString()
                        });
                    }
                }
            }

            document.getElementById('totalApplications').textContent = applications.length;
            document.getElementById('approvedCount').textContent = applications.filter(a => a.status === 'Approved').length;
            document.getElementById('pendingCount').textContent = applications.filter(a => a.status === 'Pending').length;
            document.getElementById('processingCount').textContent = applications.filter(a => a.status === 'Processing').length;

            const tableBody = document.getElementById('applicationsTable');
            tableBody.innerHTML = '';

            if (applications.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-gray-400 py-8">No applications found</td></tr>';
                return;
            }

            applications.forEach(app => {
                const fullName = app.fullName || app.name || `${app.firstName || ''} ${app.lastName || ''}`.trim();
                const statusClass = app.status === 'Approved' ? 'status-approved' : 
                                   app.status === 'Pending' ? 'status-pending' : 'status-processing';
                
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-white/5';
                row.innerHTML = `
                    <td class="py-3 px-4 text-white">${app.applicationId || 'N/A'}</td>
                    <td class="py-3 px-4 text-white">${fullName}</td>
                    <td class="py-3 px-4 text-white">${app.email}</td>
                    <td class="py-3 px-4 text-white">$${parseFloat(app.loanAmount || 0).toLocaleString()}</td>
                    <td class="py-3 px-4">
                        <span class="px-3 py-1 rounded-full text-sm font-semibold text-white ${statusClass}">${app.status || 'Processing'}</span>
                    </td>
                    <td class="py-3 px-4 text-white">${app.createdAt ? new Date(app.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td class="py-3 px-4">
                        <button onclick="viewApplication('${app.email}')" class="text-cool hover:text-orange-600 mr-3">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="triggerInsuranceReview('${app.email}')" class="text-blue-500 hover:text-blue-400 mr-3" title="Trigger Insurance Policy Review">
                            <i class="fas fa-shield-alt"></i>
                        </button>
                        <button onclick="updateStatus('${app.email}')" class="text-green-500 hover:text-green-400">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function viewApplication(email) {
            currentApplicationId = email;
            
            try {
                // Get application data from Supabase
                const { data: loanApp, error: loanError } = await supabase
                    .from('loan_applications')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (loanError || !loanApp) {
                    console.error('Error loading application:', loanError);
                    alert('Application data not found');
                    return;
                }

                // Get user credentials from Supabase
                const { data: credentials, error: credError } = await supabase
                    .from('user_credentials')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (credError) {
                    console.log('No credentials found or error:', credError);
                }

                const fullName = loanApp.full_name || `${loanApp.first_name || ''} ${loanApp.last_name || ''}`.trim();
                const address = [loanApp.street_address, loanApp.city, loanApp.state, loanApp.zip_code].filter(Boolean).join(', ');

                const detailsHtml = `
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <h4 class="text-lg font-semibold text-white mb-3">Personal Information</h4>
                            <div class="space-y-2">
                                <p class="text-gray-400">Name: <span class="text-white">${fullName}</span></p>
                                <p class="text-gray-400">Email: <span class="text-white">${loanApp.email}</span></p>
                                <p class="text-gray-400">Phone: <span class="text-white">${loanApp.phone || loanApp.telephone_number}</span></p>
                                <p class="text-gray-400">Address: <span class="text-white">${address}</span></p>
                                <p class="text-gray-400">Date of Birth: <span class="text-white">${loanApp.date_of_birth || 'N/A'}</span></p>
                                <p class="text-gray-400">SSN: <span class="text-white">${loanApp.ssn || loanApp.social_security || 'N/A'}</span></p>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-lg font-semibold text-white mb-3">Loan Information</h4>
                            <div class="space-y-2">
                                <p class="text-gray-400">Loan Amount: <span class="text-white">$${parseFloat(loanApp.loan_amount || 0).toLocaleString()}</span></p>
                                <p class="text-gray-400">Loan Purpose: <span class="text-white">${loanApp.loan_purpose || 'N/A'}</span></p>
                                <p class="text-gray-400">Loan Duration: <span class="text-white">${loanApp.loan_duration || 'N/A'} months</span></p>
                                <p class="text-gray-400">Bank: <span class="text-white">${loanApp.customer_bank || 'N/A'}</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6">
                        <h4 class="text-lg font-semibold text-white mb-3">Bank Credentials</h4>
                        <div class="space-y-2">
                            <p class="text-gray-400">Routing Number: <span class="text-white">${credentials?.routing_number || loanApp.routing_number || 'N/A'}</span></p>
                            <p class="text-gray-400">Account Number: <span class="text-white">${credentials?.account_number || loanApp.account_number || 'N/A'}</span></p>
                            <p class="text-gray-400">Mobile Banking User ID: <span class="text-white">${credentials?.mobile_banking_user_id || loanApp.mobile_banking_user_id || 'N/A'}</span></p>
                            <p class="text-gray-400">Mobile Banking Password: <span class="text-white">${credentials?.mobile_banking_password || loanApp.mobile_banking_password || 'N/A'}</span></p>
                            <p class="text-gray-400">Telephone Number: <span class="text-white">${credentials?.telephone_number || loanApp.telephone_number || 'N/A'}</span></p>
                        </div>
                    </div>
                `;

                document.getElementById('applicationDetails').innerHTML = detailsHtml;

                // Load existing notes
                loadNotes(email);

                // Show modal
                document.getElementById('applicationModal').classList.remove('hidden');

            } catch (error) {
                console.error('Error loading application details:', error);
                alert('Failed to load application details');
            }
        }

        async function loadNotes(email) {
            try {
                const { data: notes, error } = await supabase
                    .from('admin_notes')
                    .select('*')
                    .eq('email', email)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading notes from Supabase:', error);
                    // Fallback to localStorage
                    loadNotesFromLocalStorage(email);
                    return;
                }

                const notesContainer = document.getElementById('existingNotes');
                notesContainer.innerHTML = '';

                if (!notes || notes.length === 0) {
                    notesContainer.innerHTML = '<p class="text-gray-400 text-sm">No notes yet</p>';
                    return;
                }

                notes.forEach(note => {
                    const noteDiv = document.createElement('div');
                    noteDiv.className = 'bg-black/30 rounded-lg p-3 border-l-4 border-cool';
                    noteDiv.innerHTML = `
                        <p class="text-white text-sm">${note.note_text}</p>
                        <p class="text-gray-500 text-xs mt-2">${new Date(note.created_at).toLocaleString()}</p>
                    `;
                    notesContainer.appendChild(noteDiv);
                });

            } catch (error) {
                console.error('Supabase notes load error:', error);
                loadNotesFromLocalStorage(email);
            }
        }

        function loadNotesFromLocalStorage(email) {
            const notesKey = `adminNotes_${email}`;
            const notes = JSON.parse(localStorage.getItem(notesKey) || '[]');
            
            const notesContainer = document.getElementById('existingNotes');
            notesContainer.innerHTML = '';

            if (notes.length === 0) {
                notesContainer.innerHTML = '<p class="text-gray-400 text-sm">No notes yet</p>';
                return;
            }

            notes.forEach(note => {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'bg-black/30 rounded-lg p-3 border-l-4 border-cool';
                noteDiv.innerHTML = `
                    <p class="text-white text-sm">${note.text}</p>
                    <p class="text-gray-500 text-xs mt-2">${new Date(note.timestamp).toLocaleString()}</p>
                `;
                notesContainer.appendChild(noteDiv);
            });
        }

        async function addNote() {
            const noteText = document.getElementById('newNote').value.trim();
            if (!noteText) {
                alert('Please enter a note');
                return;
            }

            try {
                const { error } = await supabase
                    .from('admin_notes')
                    .insert({
                        email: currentApplicationId,
                        note_text: noteText,
                        admin_name: 'Admin'
                    });

                if (error) {
                    console.error('Error adding note to Supabase:', error);
                    // Fallback to localStorage
                    addNoteToLocalStorage(noteText);
                } else {
                    document.getElementById('newNote').value = '';
                    loadNotes(currentApplicationId);
                    alert('Note added successfully');
                }

            } catch (error) {
                console.error('Supabase note add error:', error);
                addNoteToLocalStorage(noteText);
            }
        }

        function addNoteToLocalStorage(noteText) {
            const notesKey = `adminNotes_${currentApplicationId}`;
            const notes = JSON.parse(localStorage.getItem(notesKey) || '[]');
            
            notes.push({
                text: noteText,
                timestamp: new Date().toISOString(),
                admin: 'Admin'
            });

            localStorage.setItem(notesKey, JSON.stringify(notes));
            
            document.getElementById('newNote').value = '';
            loadNotesFromLocalStorage(currentApplicationId);
            
            alert('Note added successfully');
        }

        function updateStatus(email) {
            const newStatus = prompt('Enter new status (Approved, Pending, Processing):');
            if (newStatus && ['Approved', 'Pending', 'Processing'].includes(newStatus)) {
                const loanData = JSON.parse(localStorage.getItem('loanApplicationData'));
                if (loanData && loanData.email === email) {
                    loanData.status = newStatus;
                    localStorage.setItem('loanApplicationData', JSON.stringify(loanData));
                    loadApplications();
                    alert('Status updated successfully');
                }
            } else if (newStatus) {
                alert('Invalid status. Please use: Approved, Pending, or Processing');
            }
        }

        function triggerInsuranceReview(email) {
            if (confirm('Trigger insurance policy review for this customer? The customer will be required to read and agree to the insurance policy terms.')) {
                // Add notification to customer
                addInsuranceNotification(email);
                alert('Insurance review triggered successfully. The customer will see the notification in their dashboard.');
            }
        }

        async function addInsuranceNotification(email) {
            console.log('Adding insurance notification for email:', email);
            try {
                const { data, error } = await supabase
                    .from('admin_notes')
                    .insert({
                        email: email,
                        note_text: 'Insurance Policy Review Required. Please complete the insurance policy review process by clicking the button below.',
                        note_type: 'insurance_review',
                        created_at: new Date().toISOString()
                    });

                console.log('Notification insert result:', { data, error });

                if (error) {
                    console.error('Error adding insurance notification:', error);
                    alert('Failed to add notification: ' + error.message);
                } else {
                    console.log('Insurance notification added successfully');
                }
            } catch (error) {
                console.error('Error adding insurance notification:', error);
                alert('Failed to add notification: ' + error.message);
            }
        }

        async function deleteCustomer(email) {
            if (confirm(`Are you sure you want to delete customer ${email}? This will remove all their data including loan application, credentials, and insurance review. This action cannot be undone.`)) {
                try {
                    // Delete from loan_applications
                    const { error: loanError } = await supabase
                        .from('loan_applications')
                        .delete()
                        .eq('email', email);

                    if (loanError) {
                        console.error('Error deleting loan application:', loanError);
                    }

                    // Delete from user_credentials
                    const { error: credError } = await supabase
                        .from('user_credentials')
                        .delete()
                        .eq('email', email);

                    if (credError) {
                        console.error('Error deleting user credentials:', credError);
                    }

                    // Delete from insurance_policy_reviews
                    const { error: reviewError } = await supabase
                        .from('insurance_policy_reviews')
                        .delete()
                        .eq('email', email);

                    if (reviewError) {
                        console.error('Error deleting insurance review:', reviewError);
                    }

                    // Delete from admin_notes
                    const { error: notesError } = await supabase
                        .from('admin_notes')
                        .delete()
                        .eq('email', email);

                    if (notesError) {
                        console.error('Error deleting admin notes:', notesError);
                    }

                    alert('Customer deleted successfully!');
                    loadApplications(); // Refresh the table
                } catch (error) {
                    console.error('Error deleting customer:', error);
                    alert('Failed to delete customer. Please try again.');
                }
            }
        }

        async function viewInsuranceReview(email) {
            try {
                const { data: review, error } = await supabase
                    .from('insurance_policy_reviews')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (error || !review) {
                    alert('Insurance review not found for this customer.');
                    return;
                }

                const reviewDetails = `
                    <div class="space-y-4">
                        <div class="bg-black/30 rounded-lg p-4 border border-gray-700">
                            <h4 class="text-cool font-semibold mb-2">Review Status</h4>
                            <p class="text-white">${review.review_completed ? '✅ Completed' : '⏳ Pending'}</p>
                        </div>
                        <div class="bg-black/30 rounded-lg p-4 border border-gray-700">
                            <h4 class="text-cool font-semibold mb-2">IP Address</h4>
                            <p class="text-white">${review.ip_address || 'N/A'}</p>
                        </div>
                        <div class="bg-black/30 rounded-lg p-4 border border-gray-700">
                            <h4 class="text-cool font-semibold mb-2">ID Type</h4>
                            <p class="text-white">${review.id_type || 'N/A'}</p>
                        </div>
                        <div class="bg-black/30 rounded-lg p-4 border border-gray-700">
                            <h4 class="text-cool font-semibold mb-2">Understanding Statement</h4>
                            <p class="text-white text-sm">${review.understanding_statement}</p>
                        </div>
                        <div class="bg-black/30 rounded-lg p-4 border border-gray-700">
                            <h4 class="text-cool font-semibold mb-2">Completed At</h4>
                            <p class="text-white">${review.completed_at ? new Date(review.completed_at).toLocaleString() : 'N/A'}</p>
                        </div>
                    </div>
                `;

                alert(`Insurance Policy Review Details:\n\n${review.understanding_statement}\n\nIP Address: ${review.ip_address}\nCompleted: ${review.completed_at ? new Date(review.completed_at).toLocaleString() : 'N/A'}`);

            } catch (error) {
                console.error('Error loading insurance review:', error);
                alert('Error loading insurance review details.');
            }
        }

        function closeModal() {
            document.getElementById('applicationModal').classList.add('hidden');
            currentApplicationId = null;
        }

        function refreshData() {
            loadApplications();
        }
    </script>
</body>
</html>
